<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#388bfd">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="Icons/icon-192.png">

<title>Lab Científico ULTRA PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0d1117;color:#e6edf3;}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;}
input,textarea{background:#0d1117;border:1px solid #30363d;padding:10px;border-radius:8px;width:100%;margin-bottom:8px;}
.tab{padding:10px;border-radius:8px;cursor:pointer;}
.tab.active{background:#388bfd;color:#fff;}
.toast{
position:fixed;bottom:20px;right:20px;
background:#388bfd;color:#fff;padding:10px 15px;
border-radius:8px;
}
</style>
</head>

<body class="p-4">

<header class="flex justify-between mb-6">
<h1 class="text-xl font-bold">📊 LAB CIENTÍFICO ULTRA PRO</h1>

<div class="flex gap-2">
<button onclick="installApp()" id="installBtn" class="bg-blue-600 px-3 py-2 rounded hidden">
📲 Instalar App
</button>
<button onclick="exportPDF()" class="bg-red-600 px-3 py-2 rounded">
📄 PDF
</button>
</div>
</header>

<nav class="flex gap-2 mb-6">
<div class="tab active" onclick="tab('anova')" id="t-anova">ANOVA</div>
<div class="tab" onclick="tab('reg')" id="t-reg">Regressão</div>
<div class="tab" onclick="tab('ia')" id="t-ia">IA Científica</div>
</nav>

<!-- ANOVA -->
<section id="anova">
<div class="grid md:grid-cols-3 gap-4">

<div class="card">
<textarea id="anovaInput" rows="5" placeholder="Grupo A: 10,12,15"></textarea>
<button onclick="runAnova()" class="bg-green-600 w-full py-2 rounded">Executar</button>
</div>

<div class="md:col-span-2">
<div id="anovaRes" class="card hidden mb-4"></div>
<canvas id="anovaChart"></canvas>
</div>

</div>
</section>

<!-- REGRESSÃO -->
<section id="reg" class="hidden">
<div class="grid md:grid-cols-3 gap-4">

<div class="card">
<input id="x" placeholder="X: 1,2,3">
<input id="y" placeholder="Y: 2,4,6">
<button onclick="runReg()" class="bg-blue-600 w-full py-2 rounded">Calcular</button>
</div>

<div class="md:col-span-2">
<div id="regRes" class="card hidden mb-4"></div>
<canvas id="regChart"></canvas>
</div>

</div>
</section>

<!-- IA -->
<section id="ia" class="hidden">
<div class="grid md:grid-cols-3 gap-4">

<div class="card">
<input id="reach" placeholder="Alcance">
<input id="likes" placeholder="Curtidas">
<input id="saves" placeholder="Salvos">
<button onclick="runIA()" class="bg-purple-600 w-full py-2 rounded">Gerar Texto Científico</button>
</div>

<div class="md:col-span-2">
<div id="iaRes" class="card hidden"></div>
</div>

</div>
</section>

<script>
let charts={};

/* TOAST */
function toast(msg){
const t=document.createElement("div");
t.innerText=msg;
t.className="toast";
document.body.appendChild(t);
setTimeout(()=>t.remove(),3000);
}

/* TAB */
function tab(n){
["anova","reg","ia"].forEach(t=>{
document.getElementById(t).classList.toggle("hidden",t!==n);
document.getElementById("t-"+t).classList.toggle("active",t===n);
});
}

/* ANOVA REAL */
function runAnova(){
const raw=anovaInput.value.trim();
if(!raw)return toast("Digite os dados!");

const groups={};

raw.split("\n").forEach(l=>{
const [n,v]=l.split(":");
if(n && v){
groups[n.trim()]=v.split(",").map(Number).filter(v=>!isNaN(v));
}
});

const keys=Object.keys(groups);
if(keys.length<2)return toast("Precisa de 2 grupos!");

let all=[];
keys.forEach(k=>all=all.concat(groups[k]));

const grandMean=all.reduce((a,b)=>a+b)/all.length;

let ssBetween=0, ssWithin=0;

keys.forEach(k=>{
const arr=groups[k];
const mean=arr.reduce((a,b)=>a+b)/arr.length;

ssBetween+=arr.length*(mean-grandMean)**2;

arr.forEach(v=>{
ssWithin+=(v-mean)**2;
});
});

const df1=keys.length-1;
const df2=all.length-keys.length;

const F=(ssBetween/df1)/(ssWithin/df2);

let interpret="Sem diferença significativa";
if(F>4) interpret="Diferença significativa entre grupos";

anovaRes.innerHTML=`
<b>Resultado ANOVA:</b><br>
F = ${F.toFixed(3)}<br>
${interpret}
`;

anovaRes.classList.remove("hidden");

/* gráfico */
const means=keys.map(k=>{
const arr=groups[k];
return arr.reduce((a,b)=>a+b)/arr.length;
});

chart("anovaChart","bar",keys,means);

toast("ANOVA concluída!");
}

/* REGRESSÃO */
function runReg(){
const x=document.getElementById("x").value.split(",").map(Number);
const y=document.getElementById("y").value.split(",").map(Number);

if(x.length!==y.length)return toast("Erro nos dados");

const n=x.length;

const sumX=x.reduce((a,b)=>a+b,0);
const sumY=y.reduce((a,b)=>a+b,0);
const sumXY=x.reduce((a,v,i)=>a+v*y[i],0);
const sumX2=x.reduce((a,b)=>a+b*b,0);

const m=(n*sumXY - sumX*sumY)/(n*sumX2 - sumX**2);
const b=(sumY - m*sumX)/n;

/* R2 */
const meanY=sumY/n;
let ssTot=0, ssRes=0;

for(let i=0;i<n;i++){
ssTot+=(y[i]-meanY)**2;
ssRes+=(y[i]-(m*x[i]+b))**2;
}

const r2=1-(ssRes/ssTot);

regRes.innerHTML=`
<b>Modelo:</b> y = ${b.toFixed(2)} + ${m.toFixed(2)}x<br>
<b>R²:</b> ${r2.toFixed(3)}
`;

regRes.classList.remove("hidden");

chart("regChart","scatter",x,y,true,m,b);

toast("Regressão pronta!");
}

/* IA CIENTÍFICA */
function runIA(){
const r=+reach.value;
const l=+likes.value;
const s=+saves.value;

if(!r)return toast("Alcance inválido");

const eng=((l+s)/r)*100;

let nivel="baixo impacto";
if(eng>8) nivel="alto impacto";
else if(eng>4) nivel="impacto moderado";

iaRes.innerHTML=`
<b>Discussão:</b><br>
A taxa de engajamento obtida foi de ${eng.toFixed(2)}%, caracterizando ${nivel} do conteúdo analisado. 
Os dados sugerem adequação entre a estratégia comunicacional e o comportamento do público.<br><br>

<b>Conclusão:</b><br>
Os resultados indicam eficiência na disseminação do conteúdo, sendo recomendada a manutenção 
das estratégias adotadas, com possíveis ajustes para ampliação do alcance.
`;

iaRes.classList.remove("hidden");

toast("Texto científico gerado!");
}

/* CHART */
function chart(id,type,x,y,reg=false,m=0,b=0){
const ctx=document.getElementById(id);

if(charts[id])charts[id].destroy();

const data={
labels:x,
datasets:[{
label:"Dados",
data:y,
backgroundColor:"#388bfd"
}]
};

if(reg){
data.datasets.push({
type:"line",
label:"Tendência",
data:x.map(v=>b+m*v),
borderColor:"#f85149"
});
}

charts[id]=new Chart(ctx,{type:type,data:data});
}

/* PDF */
function exportPDF(){window.print();}

/* PWA */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{
e.preventDefault();
deferredPrompt=e;
installBtn.classList.remove("hidden");
});

function installApp(){
if(deferredPrompt){
deferredPrompt.prompt();
deferredPrompt=null;
}
}
</script>

</body>
</html>
